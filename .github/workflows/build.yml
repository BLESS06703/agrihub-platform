name: AgriHub Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: cd backend && ./gradlew ktlintCheck detekt --no-daemon

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: agrihub_test, POSTGRES_USER: agrihub, POSTGRES_PASSWORD: test }
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: cd backend && ./gradlew test jacocoTestReport --no-daemon
      - uses: actions/upload-artifact@v4
        with: { name: coverage-report, path: backend/build/reports/jacoco }

  build-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: cd backend && ./gradlew shadowJar --no-daemon
      - uses: actions/upload-artifact@v4
        with: { name: backend-jar, path: backend/build/libs/agrihub-backend.jar }

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: cd mobile-android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with: { name: android-apk, path: mobile-android/app/build/outputs/apk/debug/app-debug.apk }

  docker:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t agrihub-backend ./backend
      - run: docker save agrihub-backend > backend.tar
      - uses: actions/upload-artifact@v4
        with: { name: docker-image, path: backend.tar }

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: docker
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploying to staging..."

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: docker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deploying to production..."
